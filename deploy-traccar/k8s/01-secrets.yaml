# ============================================================
# SECRETOS — credenciales de base de datos
# IMPORTANTE: Cambiar los valores antes de aplicar.
# Para mayor seguridad en producción, usar:
#   kubectl create secret generic traccar-db-secret \
#     --from-literal=db-user=traccar \
#     --from-literal=db-password=TU_PASSWORD_SEGURA \
#     --from-literal=db-name=traccar \
#     -n traccar
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: traccar-db-secret
  namespace: traccar
type: Opaque
stringData:
  db-user: traccar
  db-password: CAMBIA_ESTA_PASSWORD_ANTES_DE_APLICAR   # ← obligatorio cambiar
  db-name: traccar
