# ============================================================
# cert-manager ClusterIssuers — Let's Encrypt
#
# Prerequisito: cert-manager instalado en el cluster.
# Instalación (una sola vez):
#   kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.15.3/cert-manager.yaml
#   kubectl wait --for=condition=available --timeout=120s deployment/cert-manager -n cert-manager
#
# IMPORTANTE: Cambiar el email en ambos issuers.
# Usar letsencrypt-staging primero para probar sin límites de rate.
# Cambiar a letsencrypt-prod cuando todo funcione.
# ============================================================

# --- Emisor de PRODUCCIÓN ---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@tudominio.com   # ← cambiar por tu email real
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - http01:
          ingress:
            ingressClassName: nginx

---
# --- Emisor de STAGING (para pruebas, sin límites de rate) ---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: admin@tudominio.com   # ← cambiar por tu email real
    privateKeySecretRef:
      name: letsencrypt-staging-key
    solvers:
      - http01:
          ingress:
            ingressClassName: nginx
