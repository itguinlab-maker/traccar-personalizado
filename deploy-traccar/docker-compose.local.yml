# ============================================================
# Docker Compose — Despliegue LOCAL
# Primer uso: ejecutar deploy-traccar/setup-local.ps1 (crea volúmenes externos)
# Actualizar:  deploy-traccar/update-local.ps1
# NUNCA usar: docker compose down -v  (no borra externos, pero evitar el hábito)
# ============================================================

name: traccar

services:

  # ── Traccar personalizado ─────────────────────────────────
  traccar:
    build:
      context: ..                           # raíz del proyecto
      dockerfile: deploy-traccar/Dockerfile
    image: traccar-personalizado:local
    container_name: traccar_server
    restart: unless-stopped
    environment:
      DB_HOST: traccar-postgres
      DB_NAME: traccar
      DB_USER: traccar
      DB_PASSWORD: traccar123
    ports:
      - "8082:8082"        # Interfaz web
      - "21081:21081"      # JT808 TCP
      - "21081:21081/udp"  # JT808 UDP
      - "18400:8400"       # JT1078 vídeo (Windows reserva 8368-8567, usar 18400 en local)
    volumes:
      - traccar_app_data:/opt/traccar/data   # external: nunca lo borra compose
    networks:
      - traccar-net
    depends_on:
      traccar-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8082/api/server || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── PostgreSQL 16 ─────────────────────────────────────────
  traccar-postgres:
    image: postgres:16
    container_name: traccar-postgres
    restart: always                          # always: sobrevive reboots del host
    environment:
      POSTGRES_DB: traccar
      POSTGRES_USER: traccar
      POSTGRES_PASSWORD: traccar123
    volumes:
      - traccar_postgres_data:/var/lib/postgresql/data  # external: nunca lo borra compose
    networks:
      - traccar-net
    healthcheck:
      test: ["CMD-SHELL", "psql -U traccar -d traccar -c 'SELECT 1' -q --no-psqlrc 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

# ── Volúmenes externos ────────────────────────────────────────
# external: true = este compose NO los crea NI los borra nunca
# Creados por setup-local.ps1. Solo se eliminan con: docker volume rm <nombre>
volumes:
  traccar_postgres_data:
    external: true
  traccar_app_data:
    external: true

networks:
  traccar-net:
    driver: bridge
